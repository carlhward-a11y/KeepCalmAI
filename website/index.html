<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KeepCalmAI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <p class="brand">KeepCalmAI</p>
    <p class="tagline">Calm Today. Confident Tomorrow.</p>
  </header>

  <main>
    <section class="hero" aria-labelledby="hero-title">
      <div>
        <p class="eyebrow">Foundations</p>
        <h1 id="hero-title">AI Without Overwhelm</h1>
        <p>A calm first journey for people who want to understand AI one small step at a time.</p>
        <a class="button" href="#journey">Start the journey</a>
      </div>
    </section>

    <section id="journey" class="lesson-card" aria-labelledby="lesson-title">
      <p id="progress-label" class="progress-label">Step 1 of 9</p>
      <div class="progress" aria-hidden="true"><span id="progress-bar"></span></div>
      <p id="lesson-time" class="lesson-time"></p>
      <h2 id="lesson-title" tabindex="-1">Welcome</h2>
      <div id="lesson-body"></div>
      <div class="try-box">
        <h3 id="try-title">Try this</h3>
        <p id="try-text"></p>
      </div>
      <div class="summary-box">
        <h3>Key takeaway</h3>
        <p id="takeaway"></p>
      </div>
      <div class="button-row">
        <button id="back-button" class="button button-secondary" type="button">Back</button>
        <button id="next-button" class="button" type="button">Continue</button>
      </div>
    </section>
  </main>

  <script src="lessons.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
