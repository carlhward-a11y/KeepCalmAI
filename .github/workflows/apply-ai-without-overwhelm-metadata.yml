name: Apply AI Without Overwhelm metadata

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add metadata without changing lesson content
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/data/aiWithoutOverwhelm.ts')
          text = path.read_text()

          metadata = {
              'welcome': ["type: 'welcome'"],
              'not-behind': ["type: 'choice'"],
              'what-we-will-do': ["type: 'orientation'"],
              'what-is-ai': ["type: 'learn'"],
              'ai-is-not-magic': ["type: 'safety'"],
              'ai-is-a-conversation': ["type: 'learn'"],
              'already-used-ai': ["type: 'choice'"],
              'small-reflection': [
                  "type: 'reflection'",
                  "reflectionPrompt: 'Does AI feel a little less unfamiliar now?'"
              ],
              'open-ai-assistant': ["type: 'try'"],
              'what-do-you-see': ["type: 'orientation'"],
              'message-box': ["type: 'learn'"],
              'copy-first-prompt': ["type: 'prompt'"],
              'paste-first-prompt': ["type: 'prompt'"],
              'read-answer': ["type: 'choice'"],
              'did-it-surprise-you': ["type: 'choice'"],
              'ai-is-not-google': ["type: 'learn'"],
              'ask-another-question': ["type: 'prompt'"],
              'make-it-shorter': ["type: 'prompt'"],
              'make-it-simpler': ["type: 'prompt'"],
              'ask-for-example': ["type: 'prompt'"],
              'notice-improvement': ["type: 'choice'"],
              'what-is-prompt': ["type: 'learn'"],
              'good-prompt': ["type: 'prompt'"],
              'poor-prompt': ["type: 'prompt'"],
              'compare-prompts': ["type: 'choice'"],
              'write-your-own': ["type: 'prompt'"],
              'ai-can-be-wrong': ["type: 'safety'"],
              'when-to-check': ["type: 'safety'"],
              'human-judgement': ["type: 'safety'"],
              'safety-reflection': [
                  "type: 'reflection'",
                  "reflectionPrompt: 'What is one safety rule you want to remember?'"
              ],
              'you-have-learnt': ["type: 'learn'"],
              'confidence-now': ["type: 'confidence'"],
              'try-tomorrow': ["type: 'choice'"],
              'summary': ["type: 'summary'"],
              'journey-complete': [
                  "type: 'complete'",
                  "nextButtonLabel: 'Finish journey'"
              ]
          }

          for step_id, fields in metadata.items():
              marker = f"    id: '{step_id}',\n"
              if marker not in text:
                  raise SystemExit(f'Missing step ID: {step_id}')
              if f"    id: '{step_id}',\n    type:" in text:
                  continue
              insertion = ''.join(f'    {field},\n' for field in fields)
              text = text.replace(marker, marker + insertion, 1)

          path.write_text(text)

      - name: Validate and build
        run: |
          npm ci
          npm run validate:journeys
          npm run build

      - name: Commit target file and remove temporary workflow
        run: |
          rm .github/workflows/apply-ai-without-overwhelm-metadata.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/aiWithoutOverwhelm.ts .github/workflows/apply-ai-without-overwhelm-metadata.yml
          git commit -m "Add tutorial metadata to AI Without Overwhelm"
          git push
